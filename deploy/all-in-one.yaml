# ============================================================================
# k8s-healthcheck: CronJob 短命架構
#
# 流程:
#   1. CronJob 依 schedule 觸發 (預設 08:00 每日)
#   2. Job 啟動單一 Pod (k8s-healthcheck-runner)
#   3. Runner Pod 用 client-go 動態建立 agent DaemonSet
#   4. Runner 等所有 agent Ready 後 HTTP 取資料
#   5. Runner 寫 PDF 到 emptyDir，並刪除 agent DaemonSet
#   6. Runner 進入 --sleep-after 待機，期間使用者可 kubectl cp 取 PDF
#   7. CronJob 下次觸發以 concurrencyPolicy: Replace 取代仍在待機的舊 Job
#
# 執行時 cluster 中暫存資源:
#   - 1 個 Job 與其 1 個 Runner Pod  (一次性，由 CronJob 派生)
#   - 1 個短命 DaemonSet 與每節點 1 個 agent Pod (Runner 工作期間存在，產 PDF
#     後立即被 Runner 刪除)
#
# 用法:
#   # 部署 (建立 ServiceAccount + RBAC + CronJob，但暫不會真的跑)
#   kubectl apply -f deploy/all-in-one.yaml
#
#   # 立即觸發一輪 (不等排程)。NAME 必須放在 --from 之前。
#   kubectl -n k8s-healthcheck create job k8s-healthcheck-manual-$(date +%s) \
#     --from=cronjob/k8s-healthcheck
#
#   # 看 runner 進度
#   kubectl -n k8s-healthcheck logs -l job-name -f --tail=200
#
#   # 取 PDF (在 runner 進入 sleep-after 視窗內)
#   POD=$(kubectl -n k8s-healthcheck get pod -l app=k8s-healthcheck-runner \
#         --field-selector=status.phase=Running \
#         -o jsonpath='{.items[0].metadata.name}')
#   PDF=$(kubectl -n k8s-healthcheck exec "${POD}" -- ls /reports | head -1)
#   kubectl -n k8s-healthcheck cp "${POD}:/reports/${PDF}" "./${PDF}"
# ============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: k8s-healthcheck
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-healthcheck
  namespace: k8s-healthcheck

# ----------------------------------------------------------------------------
# RBAC: 讀全 cluster 健康資料 + 在自己 namespace 建/刪 DaemonSet
# ----------------------------------------------------------------------------
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-healthcheck-reader
rules:
  # 核心叢集狀態 (read-only)
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - services
      - events
      - persistentvolumes
      - persistentvolumeclaims
      - componentstatuses
      - configmaps
      - endpoints
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  # 工作負載 (read-only)
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  # 儲存
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses", "csidrivers", "csinodes"]
    verbs: ["get", "list"]
  # 度量
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  # API health endpoints
  - nonResourceURLs:
      - "/healthz"
      - "/healthz/*"
      - "/livez"
      - "/livez/*"
      - "/readyz"
      - "/readyz/*"
      - "/version"
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-healthcheck-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-healthcheck-reader
subjects:
  - kind: ServiceAccount
    name: k8s-healthcheck
    namespace: k8s-healthcheck
---
# Runner 需要在 k8s-healthcheck namespace 建/刪 agent DaemonSet。
# 用 (namespaced) Role + RoleBinding 而非 ClusterRole，把寫權限限縮在
# 本 ns，符合最小權限原則。
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-healthcheck-orchestrate
  namespace: k8s-healthcheck
rules:
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # 也允許列舉本 ns Pod 以做 self-filter / agent 抓取
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-healthcheck-orchestrate
  namespace: k8s-healthcheck
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: k8s-healthcheck-orchestrate
subjects:
  - kind: ServiceAccount
    name: k8s-healthcheck
    namespace: k8s-healthcheck

# ----------------------------------------------------------------------------
# CronJob: 排程觸發 Runner Pod。Runner 內部會動態建立 / 刪除 agent DaemonSet。
# ----------------------------------------------------------------------------
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-healthcheck
  namespace: k8s-healthcheck
  labels:
    app: k8s-healthcheck-runner
spec:
  # 預設 08:00 (台灣時間) 每日執行一次。改 schedule 即可調整頻率。
  schedule: "0 8 * * *"   # 台灣時間 08:00
  timeZone: "Asia/Taipei"
  # 若上一輪還在 sleep-after 待機就觸發新的，直接 Replace 老 Job (連 Pod 一併殺)。
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  # CronJob 觸發後晚於 5 分鐘才被 controller 看到就跳過 (避免時鐘飄移補跑)。
  startingDeadlineSeconds: 300
  jobTemplate:
    metadata:
      labels:
        app: k8s-healthcheck-runner
    spec:
      backoffLimit: 0
      # Job 最長存活時間: 包含工作時間 + sleep-after。預設 1h25m (留 5m 緩衝)。
      activeDeadlineSeconds: 5100
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: k8s-healthcheck-runner
        spec:
          serviceAccountName: k8s-healthcheck
          restartPolicy: Never
          tolerations:
            - operator: Exists
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            fsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: runner
              image: quay.io/cooloo9871/k8s-hk:latest
              imagePullPolicy: Always
              args:
                - --mode=aggregator
                - --orchestrate-agent
                - --out=/reports
                - --timeout=5m
                - --sleep-after=1h
                - --agent-namespace=k8s-healthcheck
                - --agent-selector=app=k8s-healthcheck-agent
                - --agent-port=8080
                - --agent-ready-timeout=2m
                # - --cluster-name=prod-tw-1   # 取消註解可指定報告上的叢集名稱
              env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                # AGENT_IMAGE 必須與 runner image 同步，這樣動態建立的 DaemonSet
                # 才會跑到正確的 agent binary。預設旗標讀此環境變數。
                - name: AGENT_IMAGE
                  value: quay.io/cooloo9871/k8s-hk:latest
              resources:
                requests:
                  cpu: 50m
                  memory: 96Mi
                limits:
                  cpu: 500m
                  memory: 384Mi
              volumeMounts:
                - name: reports
                  mountPath: /reports
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: reports
              emptyDir: {}
